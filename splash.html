<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ADSE</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"Segoe UI",sans-serif;background:linear-gradient(135deg,#0a0a0f 0%,#1a0a2e 100%);color:#e8e8f0;height:100vh;display:flex;align-items:center;justify-content:center;-webkit-app-region:drag}
  .box{width:400px;padding:32px;text-align:center;-webkit-app-region:no-drag}
  .logo{width:64px;height:64px;background:linear-gradient(135deg,#a855f7,#ec4899);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:28px;margin-bottom:16px;box-shadow:0 8px 24px rgba(168,85,247,.4)}
  h1{font-size:20px;font-weight:800;margin-bottom:4px}
  .sub{font-size:12px;color:#9999aa;margin-bottom:28px}
  input{width:100%;padding:12px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;font-size:14px;font-family:inherit;margin-bottom:10px;outline:none}
  input:focus{border-color:rgba(168,85,247,.5)}
  button{width:100%;padding:12px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;border:none;border-radius:8px;font-weight:600;font-size:14px;font-family:inherit;cursor:pointer;margin-top:6px}
  button:disabled{opacity:.5;cursor:wait}
  .err{color:#ef4444;font-size:12px;margin:8px 0;min-height:16px}
  .links{margin-top:16px;font-size:12px;color:#9999aa}
  .links a{color:#c084fc;text-decoration:none;cursor:pointer}
  .loading{display:none;margin:20px 0;font-size:12px;color:#9999aa}
  .spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.15);border-top-color:#a855f7;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="box">
  <div class="logo">A</div>
  <h1>ADSE</h1>
  <div class="sub">Director Secundaria · Agentes de Educación</div>
  <input type="email" id="email" placeholder="Tu correo electrónico" autofocus>
  <input type="password" id="password" placeholder="Contraseña">
  <div class="err" id="err"></div>
  <button id="btn">Iniciar sesión</button>
  <div class="loading" id="loading"><span class="spin"></span>Validando licencia…</div>
  <div class="links">
    ¿Aún no compraste? <a href="#" onclick="require('electron').shell.openExternal('https://agenteseducacion.com.mx')">Hazlo aquí</a>
  </div>
</div>
<script>
  const emailEl = document.getElementById('email');
  const pwdEl = document.getElementById('password');
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  const loading = document.getElementById('loading');

  async function submit() {
    err.textContent = '';
    btn.disabled = true;
    loading.style.display = 'block';
    const r = await window.adse.login(emailEl.value.trim(), pwdEl.value);
    loading.style.display = 'none';
    btn.disabled = false;
    if (r.ok) {
      window.adse.abrir();
    } else {
      err.textContent = r.error || 'No se pudo validar la licencia.';
    }
  }
  btn.addEventListener('click', submit);
  pwdEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });
</script>
</body>
</html>
